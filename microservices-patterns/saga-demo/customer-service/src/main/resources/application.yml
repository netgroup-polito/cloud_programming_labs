server:
  port: 8080

spring:
  application:
    name: customer-service
  datasource:
    url: jdbc:postgresql://localhost:5433/customerdb
    username: customer_user
    password: customer_pass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

logging:
  level:
    com.example.customerservice: DEBUG
